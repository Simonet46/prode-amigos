name: Sincronizar resultados

on:
  schedule:
    - cron: '20 */2 * * *' # cada 2 horas
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/sync-results.mjs
        env:
          SUPABASE_URL: https://pnchuwlktwayhqjlmxoh.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
