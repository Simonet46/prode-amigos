name: Noticias diarias

on:
  schedule:
    - cron: '0 12 * * *' # 9:00 AM Argentina (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/fetch-news.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/news.json docs/news.json
          git diff --cached --quiet || (git commit -m "Noticias del día" && git push)
